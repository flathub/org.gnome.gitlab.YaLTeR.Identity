app-id: org.gnome.gitlab.YaLTeR.Identity
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: identity
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    RUSTFLAGS: -C force-frame-pointers=yes
modules:
  - name: identity
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.gnome.org/YaLTeR/identity.git
        commit: 3cf4d40bf49a12d2e2f11448c1a18a2c8ea5cde5
      # Generated with flatpak-cargo-generator.py
      - cargo-sources.json
      - type: shell
        commands:
          - mkdir .cargo
          - cp cargo/config .cargo/
